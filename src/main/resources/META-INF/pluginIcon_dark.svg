<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- "j" letter, bright blue for dark theme -->
  <text x="12" y="30" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#548AF7" text-anchor="middle">j</text>
  <!-- Flamegraph bars on the right, bottom-up — bright vivid colors for dark theme -->
  <!-- row 1 (bottom): red -->
  <rect x="19" y="27" width="16" height="5" rx="1" fill="#FF7070"/>
  <!-- row 2: orange -->
  <rect x="19" y="20" width="10" height="5" rx="1" fill="#FFA060"/>
  <rect x="31" y="20" width="4"  height="5" rx="1" fill="#FFB070"/>
  <!-- row 3: yellow-orange -->
  <rect x="19" y="13" width="7"  height="5" rx="1" fill="#FFC84A"/>
  <rect x="28" y="13" width="7"  height="5" rx="1" fill="#FFD84A"/>
  <!-- row 4 (top): yellow -->
  <rect x="19" y="6"  width="5"  height="5" rx="1" fill="#FFE84A"/>
</svg>